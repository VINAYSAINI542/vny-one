<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VNYone Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body style="background: #000; color: #fff; margin: 0; font-family: sans-serif; display: flex; justify-content: center;">

    <div id="main-app" style="width: 100%; max-width: 400px; height: 100vh; border: 1px solid #262626; display: flex; flex-direction: column; overflow: hidden; background: #000;">
        
        <div style="height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; border-bottom: 1px solid #262626;">
            <h2 style="color: #00d2ff; margin: 0; font-style: italic; font-size: 22px;">VNYone</h2>
            <i class="fa-regular fa-paper-plane" style="font-size: 20px; cursor: pointer;" onclick="window.location.href='chat_list.html'"></i>
        </div>

        <div style="flex: 1; overflow-y: auto; padding: 10px;">
            
            <div id="h-scr" class="screen" style="display: block;">
                <div style="padding: 10px; display: flex; overflow-x: auto;">
                    <div style="text-align: center; width: 70px;">
                        <img id="my-st" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" 
                             style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00d2ff; object-fit: cover;">
                        <div style="font-size: 10px; margin-top: 5px;">Your Story</div>
                    </div>
                </div>
                <p style="text-align: center; color: #444; margin-top: 80px;">No Posts Yet.</p>
            </div>

            <div id="s-scr" class="screen" style="display: none;">
                <h4 style="margin: 10px 0;">Suggested</h4>
                <div id="user-list"></div>
            </div>

            <div id="p-scr" class="screen" style="display: none; text-align: center; padding-top: 40px;">
                <img id="p-dp" src="" style="width: 80px; height: 80px; border-radius: 50%; border: 2px solid #00d2ff; object-fit: cover;">
                <h2 id="p-name" style="margin-top: 15px;">Loading...</h2>
                <button onclick="firebase.auth().signOut()" style="background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; margin-top: 20px;">Logout</button>
            </div>
        </div>

        <div style="height: 60px; border-top: 1px solid #262626; display: flex; justify-content: space-around; align-items: center; background: #000;">
            <i class="fa-solid fa-house" style="font-size: 20px; color: #fff; cursor: pointer;" onclick="tab('h-scr', this)"></i>
            <i class="fa-solid fa-user-plus" style="font-size: 20px; color: #8e8e8e; cursor: pointer;" onclick="tab('s-scr', this)"></i>
            <i class="fa-regular fa-square-plus" style="font-size: 20px; color: #8e8e8e; cursor: pointer;"></i>
            <i class="fa-regular fa-circle-user" style="font-size: 20px; color: #8e8e8e; cursor: pointer;" onclick="tab('p-scr', this)"></i>
        </div>
    </div>

<script>
    // Firebase Code
    const firebaseConfig = { apiKey: "AIzaSyAq67c32Oz1wgTEqbmZStWsbNuJ2UTqgzc", authDomain: "vnyone-1.firebaseapp.com", projectId: "vnyone-1", storageBucket: "vnyone-1.firebasestorage.app", messagingSenderId: "353061173666", appId: "1:353061173666:web:022b7015e116ff4b055afb" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    function tab(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.fa-solid, .fa-regular').forEach(i => i.style.color = '#8e8e8e');
        el.style.color = '#fff';
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection("users").doc(user.uid).onSnapshot(d => {
                if(d.exists){
                    document.getElementById('my-st').src = d.data().dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    document.getElementById('p-dp').src = d.data().dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                    document.getElementById('p-name').innerText = d.data().name;
                }
            });
            loadUsers(user.uid);
        } else { window.location.href="index.html"; }
    });

    function loadUsers(myUid) {
        db.collection("users").onSnapshot(snap => {
            const list = document.getElementById('user-list');
            if(!list) return;
            list.innerHTML = "";
            snap.forEach(doc => {
                if(doc.id !== myUid) {
                    list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #111;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${doc.data().dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                            <b style="font-size:14px;">${doc.data().name}</b>
                        </div>
                        <button style="background:#00d2ff; border:none; padding:5px 12px; border-radius:5px; font-weight:bold; font-size:12px;">Follow</button>
                    </div>`;
                }
            });
        });
    }
</script>
</body>
</html>
