<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inbox Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body style="background: #000; color: #fff; margin: 0; font-family: sans-serif; display: flex; justify-content: center;">
    <div style="width: 100%; max-width: 400px; height: 100vh; border: 1px solid #262626; display: flex; flex-direction: column; background: #000;">
        <div style="display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #262626;">
            <i class="fa-solid fa-arrow-left" style="cursor:pointer; margin-right:20px;" onclick="window.location.href='home.html'"></i>
            <h3 style="margin:0;">Messages</h3>
        </div>
        <div id="chat-inbox" style="flex:1; overflow-y:auto;"></div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAq67c32Oz1wgTEqbmZStWsbNuJ2UTqgzc", authDomain: "vnyone-1.firebaseapp.com", projectId: "vnyone-1", storageBucket: "vnyone-1.firebasestorage.app", messagingSenderId: "353061173666", appId: "1:353061173666:web:022b7015e116ff4b055afb" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        if(user) {
            db.collection("users").onSnapshot(snap => {
                const inbox = document.getElementById('chat-inbox');
                inbox.innerHTML = "";
                snap.forEach(doc => {
                    if(doc.id !== user.uid) {
                        inbox.innerHTML += `
                        <div onclick="window.location.href='chat.html?receiver=${doc.id}'" style="display:flex; align-items:center; padding:12px; border-bottom:1px solid #111; cursor:pointer;">
                            <img src="${doc.data().dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" style="width:50px; height:50px; border-radius:50%; object-fit:cover; margin-right:15px;">
                            <div><b style="display:block; font-size:15px;">${doc.data().name}</b><span style="color:#8e8e8e; font-size:12px;">Tap to chat</span></div>
                        </div>`;
                    }
                });
            });
        }
    });
</script>
</body>
</html>
