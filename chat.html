<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VNYone Universe</title>
    <script src='https://meet.jit.si/external_api.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&family=Orbitron&family=Pacifico&family=Playfair+Display&family=Roboto+Mono&family=Zeyada&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-storage-compat.js"></script>

    <style>
        :root { --theme-color: #00d2ff; --font-family: 'Segoe UI'; --bg-color: #000; --msg-me: #00d2ff; --msg-them: #262626; --text: #fff; }
        * { box-sizing: border-box; font-family: var(--font-family); transition: 0.3s ease; }
        body { background: var(--bg-color); color: var(--text); margin: 0; height: 100vh; overflow: hidden; }
        
        .app-container { width: 100%; max-width: 420px; height: 100%; display: flex; flex-direction: column; margin: auto; position: relative; border: 1px solid #333; }

        /* Header */
        .header { padding: 12px; display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; z-index: 100; }
        .nav-dp { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--theme-color); }
        .status-text { font-size: 11px; color: var(--theme-color); }

        /* Calling Overlay */
        #call-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; }
        .hangup-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: #ff3b30; color: #fff; padding: 15px 40px; border-radius: 50px; cursor: pointer; z-index: 10000; font-weight: bold; border: none; }

        /* Messages */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: none; }
        .msg-row { display: flex; align-items: flex-end; gap: 8px; max-width: 85%; }
        .row-me { align-self: flex-end; flex-direction: row-reverse; }
        .chat-dp { width: 25px; height: 25px; border-radius: 50%; object-fit: cover; border: 1px solid var(--theme-color); }
        .bubble { padding: 10px 15px; border-radius: 18px; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .b-me { background: var(--msg-me); color: #000; border-bottom-right-radius: 2px; }
        .b-them { background: var(--msg-them); color: var(--text); border-bottom-left-radius: 2px; }

        /* Input Area */
        .input-wrapper { padding: 15px; background: var(--bg-color); z-index: 10; }
        .input-area { background: rgba(128,128,128,0.2); border-radius: 30px; padding: 5px 15px; display: flex; align-items: center; gap: 10px; border: 1px solid #444; }
        .main-input { flex: 1; background: transparent; border: none; color: var(--text); padding: 10px; outline: none; }

        /* Hub Menu */
        .bottom-menu { position: absolute; bottom: -100%; left: 0; width: 100%; background: #111; border-top: 3px solid var(--theme-color); border-radius: 30px 30px 0 0; padding: 20px; z-index: 5000; max-height: 75vh; overflow-y: auto; color: #fff; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .menu-active { bottom: 0; }
        .section-title { font-size: 12px; color: #888; margin: 15px 0 8px; text-transform: uppercase; }
        .grid-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .opt-card { background: #222; padding: 10px; border-radius: 10px; text-align: center; font-size: 13px; cursor: pointer; border: 1px solid #333; }
    </style>
</head>
<body>

<div id="call-screen">
    <div id="jitsi-container" style="height: 100%;"></div>
    <button class="hangup-btn" onclick="stopCall()">HANG UP</button>
</div>

<div class="app-container">
    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
            <img id="h-dp" src="" class="nav-dp">
            <div><b id="h-name">Chat</b><div id="h-status" class="status-text">...</div></div>
        </div>
        <div style="display:flex; gap:18px;">
            <i class="fa-solid fa-phone" onclick="startJitsi(false)"></i>
            <i class="fa-solid fa-video" onclick="startJitsi(true)"></i>
            <i class="fa-solid fa-ellipsis-vertical" onclick="toggleMenu()" style="cursor:pointer; padding:5px;"></i>
        </div>
    </div>

    <div id="chat-box"></div>

    <input type="file" id="media-in" hidden onchange="uploadMedia(this)">

    <div class="input-wrapper">
        <div class="input-area">
            <i class="fa-solid fa-plus" onclick="document.getElementById('media-in').click()" style="color:var(--theme-color);"></i>
            <input type="text" id="msg-in" class="main-input" placeholder="Message..." onkeypress="if(event.key==='Enter') sendMsg()">
            <i class="fa-solid fa-camera" onclick="document.getElementById('media-in').click()" style="color:var(--theme-color);"></i>
            <i class="fa-solid fa-paper-plane" onclick="sendMsg()" style="color:var(--theme-color);"></i>
        </div>
    </div>

    <div class="bottom-menu" id="menu">
        <div style="width:40px; height:5px; background:#333; border-radius:10px; margin:0 auto 20px;"></div>
        
        <div class="section-title">Themes (Cartoon & Girls)</div>
        <div class="grid-options">
            <div class="opt-card" onclick="applyTheme('#ff85a2', '#fff0f3', '#4a0e1c', '#ffb3c1')">🌸 Hello Kitty</div>
            <div class="opt-card" onclick="applyTheme('#c084fc', '#f3e8ff', '#3b0764', '#e9d5ff')">🦄 Unicorn</div>
            <div class="opt-card" onclick="applyTheme('#fbbf24', '#fffbeb', '#451a03', '#fef3c7')">🐥 Cute Duck</div>
        </div>

        <div class="section-title">Dark & Neon</div>
        <div class="grid-options">
            <div class="opt-card" onclick="applyTheme('#00ff88', '#000', '#fff', '#111')">🐉 Neon</div>
            <div class="opt-card" onclick="applyTheme('#00d2ff', '#000', '#fff', '#262626')">💎 Default</div>
        </div>

        <div class="section-title">Google Fonts</div>
        <div class="grid-options">
            <div class="opt-card" style="font-family:'Pacifico';" onclick="applyFont('Pacifico')">Cute</div>
            <div class="opt-card" style="font-family:'Orbitron';" onclick="applyFont('Orbitron')">Sci-Fi</div>
            <div class="opt-card" style="font-family:'Zeyada';" onclick="applyFont('Zeyada')">Hand</div>
        </div>

        <div class="section-title">Options</div>
        <div class="grid-options">
            <div class="opt-card" onclick="clearChat()"><i class="fa-solid fa-trash"></i> Clear Chat</div>
            <div class="opt-card" onclick="alert('Reported')"><i class="fa-solid fa-flag"></i> Help/Report</div>
        </div>
        <button onclick="toggleMenu()" style="width:100%; padding:12px; margin-top:20px; border-radius:15px; background:var(--theme-color); border:none; color:#000; font-weight:bold;">CLOSE</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAq67c32Oz1wgTEqbmZStWsbNuJ2UTqgzc", authDomain: "vnyone-1.firebaseapp.com", projectId: "vnyone-1", storageBucket: "vnyone-1.firebasestorage.app", messagingSenderId: "353061173666", appId: "1:353061173666:web:022b7015e116ff4b055afb" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();
    const rid = new URLSearchParams(window.location.search).get('receiver');
    let myData = {}, rData = {}, jitsiApi = null;

    function toggleMenu() { document.getElementById('menu').classList.toggle('menu-active'); }
    
    // Calling Functions
    function startJitsi(video) {
        document.getElementById('call-screen').style.display = 'block';
        const roomName = "VNY_" + (auth.currentUser.uid < rid ? auth.currentUser.uid + rid : rid + auth.currentUser.uid);
        
        const options = {
            roomName: roomName,
            width: '100%', height: '100%',
            parentNode: document.querySelector('#jitsi-container'),
            userInfo: { displayName: myData.name || "User" },
            configOverwrite: { startWithVideoMuted: !video, prejoinPageEnabled: false },
            interfaceConfigOverwrite: { TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup', 'tileview'] }
        };
        jitsiApi = new JitsiMeetExternalAPI("meet.jit.si", options);
        
        jitsiApi.addEventListener('videoConferenceLeft', () => { stopCall(); });
    }

    function stopCall() {
        if(jitsiApi) jitsiApi.dispose();
        document.getElementById('call-screen').style.display = 'none';
        document.getElementById('jitsi-container').innerHTML = "";
    }

    // Theme & Font Logic
    function applyTheme(accent, bg, text, msgThem) {
        const r = document.documentElement;
        r.style.setProperty('--theme-color', accent);
        r.style.setProperty('--bg-color', bg);
        r.style.setProperty('--text', text);
        r.style.setProperty('--msg-them', msgThem);
        r.style.setProperty('--msg-me', accent);
    }
    function applyFont(f) { document.documentElement.style.setProperty('--font-family', f); }

    // Firebase Logic
    function getStatus(t) {
        if(!t) return "Offline";
        const d = Math.floor((Date.now() - t) / 1000);
        if(d < 40) return "Online";
        if(d < 3600) return Math.floor(d/60) + "m ago";
        return new Date(t).toLocaleDateString();
    }

    auth.onAuthStateChanged(user => {
        if(user && rid) {
            setInterval(() => { db.collection("users").doc(user.uid).update({ lastSeen: Date.now() }); }, 20000);
            db.collection("users").doc(user.uid).get().then(d => myData = d.data());
            db.collection("users").doc(rid).onSnapshot(d => {
                rData = d.data();
                document.getElementById('h-name').innerText = rData.name;
                document.getElementById('h-dp').src = rData.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                document.getElementById('h-status').innerText = getStatus(rData.lastSeen);
                loadMsgs(user.uid);
            });
        }
    });

    function loadMsgs(muid) {
        const cid = muid < rid ? muid+"_"+rid : rid+"_"+muid;
        db.collection("chats").doc(cid).collection("messages").orderBy("time","asc").onSnapshot(snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data(); const isMe = m.sender === muid;
                const dp = isMe ? (myData.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png') : (rData.dp || 'https://cdn-icons-png.flaticon.com/512/149/149071.png');
                let content = m.text;
                if(m.img) content = `<img src="${m.img}" style="width:100%; border-radius:12px;">`;
                box.innerHTML += `<div class="msg-row ${isMe ? 'row-me' : ''}"><img src="${dp}" class="chat-dp"><div class="bubble ${isMe ? 'b-me' : 'b-them'}">${content}</div></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function sendMsg() {
        const inp = document.getElementById('msg-in');
        if(!inp.value.trim() || !auth.currentUser) return;
        const txt = inp.value; inp.value = "";
        const cid = auth.currentUser.uid < rid ? auth.currentUser.uid+"_"+rid : rid+"_"+auth.currentUser.uid;
        await db.collection("chats").doc(cid).collection("messages").add({ text: txt, sender: auth.currentUser.uid, time: Date.now() });
    }

    async function uploadMedia(input) {
        const file = input.files[0]; if(!file) return;
        const cid = auth.currentUser.uid < rid ? auth.currentUser.uid+"_"+rid : rid+"_"+auth.currentUser.uid;
        const ref = storage.ref(`chats/${cid}/${Date.now()}_${file.name}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        await db.collection("chats").doc(cid).collection("messages").add({ text: "", img: url, sender: auth.currentUser.uid, time: Date.now() });
    }

    async function clearChat() {
        if(confirm("Delete messages?")) {
            const cid = auth.currentUser.uid < rid ? auth.currentUser.uid+"_"+rid : rid+"_"+auth.currentUser.uid;
            const snap = await db.collection("chats").doc(cid).collection("messages").get();
            snap.forEach(d => d.ref.delete());
        }
    }
</script>
</body>
</html>
